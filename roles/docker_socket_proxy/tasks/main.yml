---
# Role: docker_socket_proxy — Secure Docker API proxy for internal networks

- name: Create socket-network Docker network
  community.docker.docker_network:
    name: socket-network
    driver: bridge
    state: present

- name: Create Docker Socket Proxy stack directory
  ansible.builtin.file:
    path: "{{ docker_stack_path }}/docker-socket-proxy"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Docker Socket Proxy Compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_stack_path }}/docker-socket-proxy/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Docker Socket Proxy environment file
  ansible.builtin.template:
    src: docker_socket_proxy.env.j2
    dest: "{{ docker_stack_path }}/docker-socket-proxy/.env"
    owner: root
    group: root
    mode: "0600"

- name: Start Docker Socket Proxy
  community.docker.docker_compose_v2:
    project_src: "{{ docker_stack_path }}/docker-socket-proxy"
    state: present
